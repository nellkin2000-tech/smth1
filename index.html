<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тренажер: Возражение "Дорого"</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            color: #1a2b4a;
            line-height: 1.6;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            overflow: hidden;
            width: 100%;
        }

        /* Progress Bar */
        .progress-container {
            background: #e8ecf1;
            padding: 20px;
        }

        .progress-bar {
            display: flex;
            justify-content: space-between;
            position: relative;
        }

        .progress-line {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 3px;
            background: #e8ecf1;
            transform: translateY(-50%);
            z-index: 1;
        }

        .progress-fill {
            position: absolute;
            top: 50%;
            left: 0;
            height: 3px;
            background: #c0503a;
            transform: translateY(-50%);
            z-index: 2;
            transition: width 0.3s ease;
        }

        .progress-step {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #e8ecf1;
            border: 3px solid #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
            position: relative;
            z-index: 3;
            transition: all 0.3s ease;
        }

        .progress-step.active {
            background: #c0503a;
            color: white;
        }

        .progress-step.completed {
            background: #2d7a4f;
            color: white;
        }

        /* Score */
        .score-display {
            text-align: right;
            padding: 10px 20px;
            font-size: 14px;
            color: #1a2b4a;
            font-weight: 600;
        }

        /* Content */
        .content {
            padding: 40px;
        }

        h1 {
            font-size: 28px;
            color: #1a2b4a;
            margin-bottom: 20px;
        }

        h2 {
            font-size: 22px;
            color: #1a2b4a;
            margin-bottom: 15px;
        }

        .context {
            font-size: 14px;
            color: #667;
            margin-bottom: 15px;
            font-style: italic;
        }

        .scene-text {
            font-size: 16px;
            margin-bottom: 25px;
            color: #334;
        }

        /* Client Message Bubble */
        .client-message {
            background: #f0f2f5;
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
            max-width: 100%;
            width: auto;
        }

        .client-name {
            font-size: 12px;
            color: #667;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .client-text {
            font-size: 16px;
            color: #1a2b4a;
        }

        .scene-note {
            font-size: 14px;
            color: #667;
            margin-top: 15px;
            font-style: italic;
        }

        /* Branch Badge */
        .branch-badge {
            display: inline-block;
            background: #c0503a;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        /* Options Grid */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 25px 0;
            width: 100%;
        }

        .options-grid.three-options {
            grid-template-columns: 1fr;
        }

        .option-btn {
            padding: 20px;
            background: white;
            border: 2px solid #1a2b4a;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            font-size: 15px;
            color: #1a2b4a;
            transition: all 0.2s ease;
            font-family: inherit;
            width: 100%;
            word-wrap: break-word;
            hyphens: auto;
        }

        .option-btn:hover:not(:disabled) {
            background: #f0f2f5;
        }

        .option-btn:disabled {
            cursor: default;
        }

        .option-btn.correct {
            background: #2d7a4f;
            border-color: #2d7a4f;
            color: white;
        }

        .option-btn.incorrect {
            background: #c0503a;
            border-color: #c0503a;
            color: white;
        }

        .option-btn.partial {
            background: #d4a012;
            border-color: #d4a012;
            color: white;
        }

        /* Explanation */
        .explanation {
            background: #f8f9fa;
            border-left: 4px solid #1a2b4a;
            padding: 20px;
            margin: 20px 0;
            border-radius: 0 8px 8px 0;
            display: none;
        }

        .explanation.show {
            display: block;
        }

        .explanation-title {
            font-weight: 600;
            margin-bottom: 10px;
            color: #1a2b4a;
        }

        /* Next Button */
        .next-btn {
            background: #c0503a;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 20px;
            display: none;
            font-family: inherit;
        }

        .next-btn.show {
            display: inline-block;
        }

        .next-btn:hover {
            background: #a04030;
        }

        /* Result Screen */
        .result-screen {
            text-align: center;
            padding: 40px 20px;
        }

        .result-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .result-title {
            font-size: 28px;
            color: #1a2b4a;
            margin-bottom: 20px;
        }

        .result-text {
            font-size: 16px;
            color: #334;
            margin-bottom: 30px;
            line-height: 1.8;
        }

        .result-score {
            font-size: 24px;
            font-weight: 600;
            color: #c0503a;
            margin-bottom: 30px;
        }

        .result-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .result-btn {
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: 600;
            font-family: inherit;
            transition: all 0.2s ease;
        }

        .result-btn.primary {
            background: #c0503a;
            color: white;
            border: none;
        }

        .result-btn.primary:hover {
            background: #a04030;
        }

        .result-btn.secondary {
            background: white;
            color: #1a2b4a;
            border: 2px solid #1a2b4a;
        }

        .result-btn.secondary:hover {
            background: #f0f2f5;
        }

        .bonus-btn {
            background: #d4a012;
            color: white;
            border: none;
        }

        .bonus-btn:hover {
            background: #c49002;
        }

        /* Start Button */
        .start-btn {
            background: #c0503a;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 30px;
            font-family: inherit;
        }

        .start-btn:hover {
            background: #a04030;
        }

        /* Responsive */
        @media (max-width: 600px) {
            body {
                padding: 10px;
            }

            .container {
                border-radius: 8px;
            }

            .content {
                padding: 25px 20px;
            }

            .options-grid {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 24px;
            }

            h2 {
                font-size: 20px;
            }

            .progress-step {
                width: 28px;
                height: 28px;
                font-size: 12px;
            }

            .client-message {
                padding: 15px;
            }

            .client-text {
                font-size: 15px;
            }

            .option-btn {
                padding: 15px;
                font-size: 14px;
            }
        }

        .hidden {
            display: none;
        }
    </style>
</head>

                    }
                ]
            },
            bonus: {
                title: 'Ловушка профессионала',
                text: `Одна из самых частых ошибок - принять решение за клиента ещё до того, как он что-то сказал. Консультант смотрит на покупателя и думает: «Это ему слишком дорого» — и сам снижает планку презентации. Клиент ничего не просил, а уже получил бюджетный вариант.`,
                situation: 'Клиент заходит в шоурум в простой одежде. Консультант сразу ведёт его к коллекции эконом-сегмента, не задав ни одного вопроса.',
                question: 'Что не так в действиях консультанта?',
                options: [
                    {
                        text: 'Он правильно среагировал - сразу учёл возможности клиента',
                        correct: false,
                        explanation: 'Внешность не определяет бюджет. Консультант, который "решает за клиента", теряет сделки в среднем и премиум-сегменте.'
                    },
                    {
                        text: 'Он начал с показа товара, а не с вопросов',
                        correct: false,
                        explanation: 'Дело не в порядке - дело в том, что он выбрал товар по собственному предположению о бюджете клиента.'
                    },
                    {
                        text: 'Он решил за клиента, что тому по карману — не спросив',
                        correct: true,
                        explanation: 'Правило простое: начинай с вопросов и показывай лучшее — пусть клиент сам скажет, если это не то.'
                    }
                ]
            }
        };

        // Initialize
        function init() {
            const branches = ['A', 'B', 'V'];
            currentBranch = branches[Math.floor(Math.random() * 3)];

            if (currentBranch === 'V') {
                maxScore = 6;
            } else {
                maxScore = 5;
            }

            currentStep = 0;
            score = 0;
            answered = false;
            branchVPart = 0;

            updateProgress();
            renderScreen();
        }

        // Update progress bar
        function updateProgress() {
            const steps = document.querySelectorAll('.progress-step');
            const progressFill = document.getElementById('progressFill');

            steps.forEach((step, index) => {
                step.classList.remove('active', 'completed');
                if (index < currentStep) {
                    step.classList.add('completed');
                } else if (index === currentStep) {
                    step.classList.add('active');
                }
            });

            const progressPercent = (currentStep / 5) * 100;
            progressFill.style.width = `${progressPercent}%`;

            // Update step labels for branch V
            if (currentBranch === 'V') {
                steps[4].textContent = '4a';
                steps[5].textContent = '4b';
            } else {
                steps[4].textContent = '4';
                steps[5].textContent = '5';
            }
        }

        // Render screen based on current step
        function renderScreen() {
            const contentDiv = document.getElementById('content');
            contentDiv.innerHTML = '';

            switch(currentStep) {
                case 0:
                    renderIntro(contentDiv);
                    break;
                case 1:
                    renderScene(contentDiv);
                    break;
                case 2:
                    renderStep(content.step1, 1);
                    break;
                case 3:
                    renderStep(content.step2, 2);
                    break;
                case 4:
                    renderStep(content.step3, 3);
                    break;
                case 5:
                    renderStep4();
                    break;
                case 6:
                    renderStep(content.step5, 5);
                    break;
                case 7:
                    renderResult();
                    break;
                case 8:
                    renderBonus();
                    break;
            }

            document.getElementById('scoreValue').textContent = score.toFixed(1);
        }

        // Render intro screen
        function renderIntro(container) {
            container.innerHTML = `
                <h1>${content.intro.title}</h1>
                <p class="scene-text">${content.intro.text}</p>
                <button class="start-btn" onclick="nextStep()">${content.intro.button}</button>
            `;
        }

        // Render scene screen
        function renderScene(container) {
            container.innerHTML = `
                <p class="context">${content.scene.subtitle}</p>
                <div class="client-message">
                    <div class="client-name">Клиент</div>
                    <div class="client-text">${content.scene.clientMessage}</div>
                </div>
                <p class="scene-note">${content.scene.note}</p>
                <h2 style="margin-top: 30px;">${content.scene.question}</h2>
                <button class="start-btn" onclick="nextStep()">${content.scene.button}</button>
            `;
        }

        // Render step with options
        function renderStep(stepData, stepNumber) {
            const contentDiv = document.getElementById('content');
            const isThreeOptions = stepData.options.length === 3;

            let html = '';

            if (stepData.context) {
                html += `<p class="context">${stepData.context}</p>`;
            }

            html += `<h2>${stepData.question}</h2>`;
            html += `<div class="options-grid ${isThreeOptions ? 'three-options' : ''}">`;

            stepData.options.forEach((option, index) => {
                html += `<button class="option-btn" data-index="${index}" onclick="selectOption(this, ${stepNumber})">${option.text}</button>`;
            });

            html += `</div>`;
            html += `<div class="explanation" id="explanation">`;
            html += `<div class="explanation-title">Пояснение:</div>`;
            html += `<div id="explanationText"></div>`;
            html += `</div>`;
            html += `<button class="next-btn" id="nextBtn" onclick="nextStep()">Далее →</button>`;

            contentDiv.innerHTML = html;
        }

        // Render step 4 with branching
        function renderStep4() {
            const contentDiv = document.getElementById('content');
            let stepData;

            if (currentBranch === 'V' && branchVPart === 0) {
                stepData = content.step4.branchV.part1;
            } else if (currentBranch === 'V' && branchVPart === 1) {
                stepData = content.step4.branchV.part2;
            } else if (currentBranch === 'A') {
                stepData = content.step4.branchA;
            } else {
                stepData = content.step4.branchB;
            }

            const isThreeOptions = stepData.options.length === 3;
            const branchLabel = branchLabels[currentBranch];

            let html = '';
            html += `<span class="branch-badge">Ситуация: ${branchLabel}</span>`;
            html += `<p class="context">Клиент отвечает:</p>`;
            html += `<div class="client-message">`;
            html += `<div class="client-name">Клиент</div>`;
            html += `<div class="client-text">${stepData.clientMessage}</div>`;
            html += `</div>`;
            html += `<h2>${stepData.question}</h2>`;
            html += `<div class="options-grid ${isThreeOptions ? 'three-options' : ''}">`;

            stepData.options.forEach((option, index) => {
                html += `<button class="option-btn" data-index="${index}" onclick="selectOption(this, 4)">${option.text}</button>`;
            });

            html += `</div>`;
            html += `<div class="explanation" id="explanation">`;
            html += `<div class="explanation-title">Пояснение:</div>`;
            html += `<div id="explanationText"></div>`;
            html += `</div>`;
            html += `<button class="next-btn" id="nextBtn" onclick="nextStep()">Далее →</button>`;

            contentDiv.innerHTML = html;
        }

        // Select option handler
        function selectOption(button, stepNumber) {
            if (answered) return;

            answered = true;
            const index = parseInt(button.getAttribute('data-index'));
            let stepData;

            if (stepNumber === 4) {
                if (currentBranch === 'V' && branchVPart === 0) {
                    stepData = content.step4.branchV.part1;
                } else if (currentBranch === 'V' && branchVPart === 1) {
                    stepData = content.step4.branchV.part2;
                } else if (currentBranch === 'A') {
                    stepData = content.step4.branchA;
                } else {
                    stepData = content.step4.branchB;
                }
            } else if (stepNumber === 1) {
                stepData = content.step1;
            } else if (stepNumber === 2) {
                stepData = content.step2;
            } else if (stepNumber === 3) {
                stepData = content.step3;
            } else if (stepNumber === 5) {
                stepData = content.step5;
            } else if (stepNumber === 8) {
                stepData = content.bonus;
            }

            const option = stepData.options[index];
            const buttons = document.querySelectorAll('.option-btn');

            // Disable all buttons and highlight selected
            buttons.forEach((btn, i) => {
                btn.disabled = true;
                if (i === index) {
                    if (option.correct) {
                        btn.classList.add('correct');
                        score += 1;
                    } else if (option.partial) {
                        btn.classList.add('partial');
                        score += 0.5;
                    } else {
                        btn.classList.add('incorrect');
                    }
                }
            });

            // Show explanation
            const explanation = document.getElementById('explanation');
            const explanationText = document.getElementById('explanationText');
            explanationText.textContent = option.explanation;
            explanation.classList.add('show');

            // Show next button
            const nextBtn = document.getElementById('nextBtn');
            nextBtn.classList.add('show');

            // Update score display
            document.getElementById('scoreValue').textContent = score.toFixed(1);
        }

        // Next step handler
        function nextStep() {
            answered = false;

            if (currentStep === 0) {
                currentStep = 1;
            } else if (currentStep === 1) {
                currentStep = 2;
            } else if (currentStep === 2) {
                currentStep = 3;
            } else if (currentStep === 3) {
                currentStep = 4;
         } else if (currentStep === 4) {
    currentStep = 5;  // всегда идём дальше
} else if (currentStep === 5) {
    if (currentBranch === 'V' && branchVPart === 0) {
        branchVPart = 1;
        // Stay on step 5, render part 2
    } else {
        currentStep = 6;
            } else if (currentStep === 6) {
                currentStep = 7;
                attemptCount++;
            } else if (currentStep === 7) {
                currentStep = 8;
            } else if (currentStep === 8) {
                // Restart after bonus
                init();
                return;
            }

            updateProgress();
            renderScreen();
        }

        // Render result screen
        function renderResult() {
            const contentDiv = document.getElementById('content');
            const percentage = (score / maxScore) * 100;

            let title, text, icon;

            if (percentage >= 80) {
                title = 'Сделка закрыта ✓';
                text = 'Вы уверенно провели клиента через возражение: выслушали, присоединились, уточнили природу, ответили по существу и взяли инициативу в конце. Такой консультант закрывает сделку — клиент уходит не "думать", а с покупкой.';
                icon = '🎉';
            } else if (percentage >= 50) {
                title = 'Почти — но клиент ушёл думать';
                text = 'Вы знаете схему, но в одном-двух шагах потеряли инициативу или упустили уточнение. Именно в этих точках разрушается большинство сделок. Посмотрите на шаги с ошибкой.';
                icon = '🤔';
            } else {
                title = 'Клиент ушёл. Разберёмся почему.';
                text = 'Возражение "дорого" — не приговор для сделки. Это сигнал: клиент заинтересован, но ему нужна помощь. Перечитайте пояснения к каждому шагу — там ключ.';
                icon = '📚';
            }

            let bonusButton = '';
            if (attemptCount >= 2) {
                bonusButton = `<button class="result-btn bonus-btn" onclick="renderBonusScreen()">Бонусный разбор →</button>`;
            }

            contentDiv.innerHTML = `
                <div class="result-screen">
                    <div class="result-icon">${icon}</div>
                    <h1 class="result-title">${title}</h1>
                    <p class="result-text">${text}</p>
                    <div class="result-score">Ваш результат: ${score} из ${maxScore} баллов (${percentage.toFixed(0)}%)</div>
                    <div class="result-buttons">
                        <button class="result-btn primary" onclick="init()">Пройти ещё раз</button>
                        <button class="result-btn secondary" onclick="initWithNewBranch()">Попробовать другую ситуацию</button>
                        ${bonusButton}
                    </div>
                </div>
            `;

            // Hide progress bar on result screen
            document.getElementById('progressContainer').style.display = 'none';
        }

        // Render bonus screen directly
        function renderBonusScreen() {
            currentStep = 8;
            document.getElementById('progressContainer').style.display = 'block';
            updateProgress();
            renderScreen();
        }

        // Render bonus content
        function renderBonus() {
            const contentDiv = document.getElementById('content');
            const stepData = content.bonus;

            let html = '';
            html += `<h1>${stepData.title}</h1>`;
            html += `<p class="scene-text">${stepData.text}</p>`;
            html += `<p class="context" style="margin-top: 20px;">${stepData.situation}</p>`;
            html += `<h2 style="margin-top: 30px;">${stepData.question}</h2>`;
            html += `<div class="options-grid three-options">`;

            stepData.options.forEach((option, index) => {
                html += `<button class="option-btn" data-index="${index}" onclick="selectOption(this, 8)">${option.text}</button>`;
            });

            html += `</div>`;
            html += `<div class="explanation" id="explanation">`;
            html += `<div class="explanation-title">Пояснение:</div>`;
            html += `<div id="explanationText"></div>`;
            html += `</div>`;
            html += `<button class="next-btn" id="nextBtn" onclick="nextStep()">Завершить →</button>`;

            contentDiv.innerHTML = html;
        }

        // Restart with new branch
        function initWithNewBranch() {
            const branches = ['A', 'B', 'V'];
            let newBranch;
            do {
                newBranch = branches[Math.floor(Math.random() * 3)];
            } while (newBranch === currentBranch);

            currentBranch = newBranch;
            init();
        }

        // Start the trainer
        init();
    </script>
</body>
</html>
